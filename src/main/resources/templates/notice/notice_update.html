<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 공지사항 수정</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/notice_update.css}" />
</head>
<!-- data-nav-current: 상단 네비게이션에서 현재 활성화된 메뉴(notice)를 표시하기 위한 속성 -->
<body data-nav-current="notice">

	<!--
	==================================
	  공통 헤더바
	==================================
	-->
	<header th:replace="~{fragments/layout :: header}"></header>

	<!--
	==================================
	 공통 네비게이션 바
	==================================
	-->
	<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
  <div class="notice-detail-wrap">
    <h1 class="notice-detail-title">공지사항 수정</h1>

    <!-- 공지사항 수정 폼: data-notice-id로 어느 공지를 수정하는지 JS에서 참조 -->
    <form id="noticeUpdateForm" th:attr="data-notice-id=${notice.noticeId}">
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="notice_title" name="notice_title" th:value="${notice.noticeTitle}" />
      </div>
      <div class="form-row">
        <label>내용</label>
        <textarea id="notice_content" name="notice_content" th:text="${notice.noticeContent}"></textarea>
      </div>
      <div class="edit-toolbar">
        <a th:href="@{/notice/{id}(id=${notice.noticeId})}" class="btn">취소</a>
        <button type="button" class="btn btn-primary" id="noticeSaveBtn">수정 완료</button>
      </div>
    </form>
  </div>
</main>


<!-- 알림 슬라이드 패널 -->
<div class="overlay-backdrop" id="notificationBackdrop"></div>
<aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

    <!--
  ================================
  퀴즈 영역
  ================================
  -->
    <button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
    <div class="overlay-backdrop" id="quizBackdrop"></div>
    <aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>


	<!--layout.html의 채팅방 영역 -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>
	<!-- 채팅방 전용 알림 슬라이드 패널 (채팅 패널 옆에 나란히 열림) -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chatNotif}"></aside>

<!-- 공통 푸터 -->
<footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/chat.js}"></script>
<script th:src="@{/js/notice_update.js}"></script>
</body>
</html>
