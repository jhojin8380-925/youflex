<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 공지사항 상세</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/notice_detail.css}" />
</head>
<!-- data-nav-current: 상단 네비게이션에서 현재 활성화된 메뉴(notice)를 표시하기 위한 속성 -->
<body data-nav-current="notice">


	<!--
	==================================
	  공통 헤더바
	==================================
	-->
<header th:replace="~{fragments/layout :: header}"></header>

<!--
==================================
  공통 네비게이션 바
==================================
-->
<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
  <div class="notice-detail-wrap">

    <!-- 공지사항 제목 + 관리자 전용 액션 버튼 영역 -->
    <div class="notice-detail-title-row">
      <!-- 공지사항 제목 출력 -->
      <h1 class="notice-detail-title" th:text="${notice.noticeTitle}">제목</h1>

      <!-- 관리자만 수정/삭제 버튼 노출 -->
      <!-- sec:authorize 사용을 위해서는 상위 <html> 태그에 xmlns:sec="http://www.thymeleaf.org/extras/spring-security" 선언이 필요함 (현재 누락되어 있어 동작하지 않을 수 있음) -->
      <div class="owner-actions" style="display:flex;gap:8px;flex-shrink:0" sec:authorize="hasRole('ADMIN')">
        <!-- 수정 페이지로 이동 (noticeId를 경로 변수로 전달) -->
        <a th:href="@{/notice/{id}/edit(id=${notice.noticeId})}" class="btn btn-sm">수정</a>
        <!-- 삭제 버튼 - 클릭 시 하단 deleteNotice() 스크립트 함수 호출 -->
        <button class="btn btn-sm" style="border-color:var(--danger);color:var(--danger)"
                th:onclick="|deleteNotice(${notice.noticeId})|">삭제</button>
      </div>
    </div>

    <!-- 공지사항 메타 정보: 등록일 / 작성자 / 조회수 -->
    <div class="notice-detail-meta">
      등록일: <span th:text="${#temporals.format(notice.noticeCreatedAt, 'yyyy-MM-dd HH:mm')}">2026-06-25 10:15</span><br />
      작성자: 관리자<br />
      <!-- 조회수 - 상세 페이지 진입 시 서버(NoticeServiceImpl)에서 1 증가된 값 -->
      조회수: <span th:text="${notice.noticeHit}">1.5K</span>
    </div>

    <!-- 공지사항 본문 내용 -->
    <div class="notice-detail-body" th:text="${notice.noticeContent}">본문</div>

    <!-- 목록 페이지로 이동하는 링크 -->
    <a th:href="@{/notice}" class="btn btn-primary">목록으로 (To List)</a>
  </div>
</main>

<!-- 패널들 동일, 생략 -->

<script src="/js/app.js"></script>
<script>
  // 공지사항 삭제 처리 함수
  // - 확인창(confirm)으로 재확인 후, DELETE API 호출
  // - 삭제 성공 시 목록 페이지로 리다이렉트
  function deleteNotice(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    fetch(`/api/notice/${id}`, { method: 'DELETE' })
      .then(res => { if (res.ok) location.href = '/notice'; });
  }
</script>
</body>
</html>
