<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 공지사항 상세</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/notice_detail.css}" />
</head>
<!-- data-nav-current: 상단 네비게이션에서 현재 활성화된 메뉴(notice)를 표시하기 위한 속성 -->
<body data-nav-current="notice">


	<!--
	==================================
	  공통 헤더바
	==================================
	-->
<header th:replace="~{fragments/layout :: header}"></header>

<!--
==================================
  공통 네비게이션 바
==================================
-->
<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
  <div class="notice-detail-wrap">

    <!-- 공지사항 제목 + 관리자 전용 액션 버튼 영역 -->
    <div class="notice-detail-title-row">
      <!-- 공지사항 제목 출력 -->
      <h1 class="notice-detail-title"><span class="badge badge-admin" style="margin-right:8px">공지</span><span th:text="${notice.noticeTitle}">제목</span></h1>

      <!-- 관리자만 수정/삭제 버튼 노출. 세션의 loginMember.memberGrade를 직접 비교 (Spring Security sec:authorize 미사용) -->
      <div class="owner-actions" style="display:flex;gap:8px;flex-shrink:0"
           th:if="${session.loginMember != null and session.loginMember.memberGrade == '관리자'}">
        <!-- 수정 페이지로 이동 (noticeId를 경로 변수로 전달) -->
        <a th:href="@{/notice/{id}/update(id=${notice.noticeId})}" class="btn btn-sm">수정</a>
        <!-- 삭제 버튼 - 클릭 시 하단 deleteNotice() 스크립트 함수 호출 -->
        <button class="btn btn-sm" style="border-color:var(--danger);color:var(--danger)"
                th:onclick="|deleteNotice(${notice.noticeId})|">삭제</button>
      </div>
    </div>

    <!-- 공지사항 메타 정보: 등록일 / 작성자 / 조회수 -->
    <div class="notice-detail-meta">
      등록일: <span th:text="${#temporals.format(notice.noticeCreatedAt, 'yyyy-MM-dd HH:mm')}">2026-06-25 10:15</span><br />
      작성자: 관리자<br />
      <!-- 조회수 - 상세 페이지 진입 시 서버(NoticeServiceImpl)에서 1 증가된 값 -->
      조회수: <span th:text="${notice.noticeHit}">1.5K</span>
    </div>

    <!-- 공지사항 본문 내용 -->
    <div class="notice-detail-body" th:text="${notice.noticeContent}">본문</div>

    <!-- 목록 페이지로 이동하는 링크 -->
    <a th:href="@{/notice}" class="btn btn-primary">목록으로 (To List)</a>
  </div>
</main>

<!-- 공통 푸터 -->
<footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>

	<!-- 알림 슬라이드 패널 -->
	<div class="overlay-backdrop" id="notificationBackdrop"></div>
	<aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

	<!-- 퀴즈 실행 플로팅 버튼(FAB) 및 퀴즈 패널 -->
	<button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
	<div class="overlay-backdrop" id="quizBackdrop"></div>
	<aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>

	<!--layout.html의 채팅방 영역 -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>
	<!-- 채팅방 전용 알림 슬라이드 패널 (채팅 패널 옆에 나란히 열림) -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chatNotif}"></aside>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/notice_detail.js}"></script>
</body>
</html>
