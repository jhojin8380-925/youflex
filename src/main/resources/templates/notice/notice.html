<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>YouFlex - 공지사항 / Q&A</title>

	<!-- 마이그레이션 중 목업 경로(/assets/css)가 남아있던 버그 수정: static/css로 이전 완료된 실제 경로로 교체 -->

	<link rel="stylesheet" th:href="@{/css/common.css}" />
	<link rel="stylesheet" th:href="@{/css/notice.css}" />
</head>

<!-- data-nav-current: 상단 네비게이션에서 현재 활성화된 메뉴(notice)를 표시하기 위한 속성 -->
<body data-nav-current="notice">

	<!--
	==================================
	  공통 헤더바
	==================================
	-->
	<header th:replace="~{fragments/layout :: header}"></header>

	<!-- 
	==================================
	 공통 네비게이션 바
	==================================
	-->
	<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>



<main class="container">

  <!-- 공지사항 / Q&A 탭 전환 버튼 (탭 전환 동작은 05_notice.js에서 data-tab-target 기준으로 처리) -->
  <div class="notice-tabs" data-tab-panels>
    <button class="active" data-tab-target="notice">공지사항</button>
    <button data-tab-target="qna">Q&A</button>
  </div>

  <!-- 공지사항: 서버에서 렌더링된 실제 데이터 -->
	<div data-tab-panel="notice" class="mt-24">
		<table class="notice-table">
			<thead>
				<tr>
					<th class="num">No</th>
					<th>제목</th>
					<th class="meta">작성자</th>
					<th class="meta">날짜</th>
					<th class="meta">조회수</th>
				</tr>
			</thead>
			<tbody id="noticeListBody">
				<!-- 등록된 공지사항이 없을 경우 안내 문구 표시 -->
				<tr th:if="${#lists.isEmpty(noticeList)}">
					<td colspan="5" style="text-align:center;color:var(--text-2)">등록된 공지사항이 없습니다.</td>
				</tr>
				<!-- 공지사항 목록 반복 출력 -->
				<tr th:each="notice, stat : ${noticeList}">
					<!-- 번호: 최신순 정렬을 가정하고 역순 번호 매김 (총 개수 - 현재 인덱스) -->
					<td class="num"><span class="badge" th:text="${noticeList.size() - stat.index}">1</span></td>
					<td>
						<!-- 제목 클릭 시 상세 페이지로 이동 -->
						<a class="title-link" th:href="@{/notice/{id}(id=${notice.noticeId})}">
							<span class="badge badge-admin" style="margin-right:6px">공지</span><span th:text="${notice.noticeTitle}">제목</span>
						</a>
					</td>
					<!-- 작성자는 공지사항 특성상 항상 "관리자"로 고정 표기 (DB 값 미사용) -->
					<td class="meta">관리자</td>
					<td class="meta" th:text="${#temporals.format(notice.noticeCreatedAt, 'yyyy-MM-dd')}">2026-06-28
					</td>
					<td class="meta" th:text="'👁 ' + ${notice.noticeHit}">👁 1.2K</td>
				</tr>
			</tbody>
		</table>
		<div class="pagination" id="noticePagination"></div>
	</div>

	<!-- Q&A: 여기는 아직 QnaService 없으니 자리만 유지, 추후 동일 패턴 적용 -->
	<!-- 초기 display:none 처리되어 있으며, 탭 클릭 시 JS가 notice/qna 패널을 토글함 -->
	<div data-tab-panel="qna" class="mt-24" style="display:none">
		<!-- 질문 작성 페이지로 이동하는 버튼 -->
		<div style="text-align:right;margin-bottom:12px">
			<a th:href="@{/qna/write}" class="btn btn-sm btn-primary">질문 작성</a>
		</div>
		<table class="notice-table">
			<thead>
				<tr>
					<th class="num">No</th>
					<th>제목</th>
					<th class="meta">작성자</th>
					<th class="meta">날짜</th>
					<th class="meta">조회수</th>
					<th class="meta">답변상태</th>
				</tr>
			</thead>
			<tbody id="qnaListBody">
			  <tr th:if="${#lists.isEmpty(qnaList)}">
			    <td colspan="6" style="text-align:center;color:var(--text-2)">등록된 질문이 없습니다.</td>
			  </tr>
			  <tr th:each="qna, stat : ${qnaList}"
			      th:with="canViewQna=${qna.qnaIsSecret != '비밀' or (session.loginMember != null and (session.loginMember.memberId == qna.memberId or session.loginMember.memberGrade == '관리자'))}">
			    <td class="num"><span class="badge" th:text="${qnaList.size() - stat.index}">1</span></td>
			    <td>
			      <a class="title-link" th:if="${canViewQna}" th:href="@{/qna/{id}(id=${qna.qnaId})}">
			        <!-- 본인/관리자에게는 비밀글이어도 제목이 보이므로 자물쇠로 구분 표시 -->
			        <span th:if="${qna.qnaIsSecret == '비밀'}">🔒&nbsp;</span><span th:text="${qna.qnaTitle}">제목</span>
			      </a>
			      <span class="title-link" th:unless="${canViewQna}" style="color:var(--text-2);cursor:default" th:text="'🔒 비공개 질문입니다'">🔒 비공개 질문입니다</span>
			    </td>
			    <td class="meta" th:text="${qna.memberName}">닉네임</td>
			    <td class="meta" th:text="${#temporals.format(qna.qnaCreatedAt, 'yyyy-MM-dd')}">2026-06-28</td>
			    <td class="meta" th:text="'👁 ' + ${qna.qnaHit}">👁 0</td>
			    <td class="meta">
			      <span class="status-pill status-pending" th:if="${qna.qnaStatus == '답변대기'}">답변대기</span>
			      <span class="status-pill status-active" th:if="${qna.qnaStatus == '답변완료'}">답변완료</span>
			    </td>
			  </tr>
			</tbody>
		</table>
		<div class="pagination" id="qnaPagination"></div>
	</div>
	</main>

	<!-- 알림/퀴즈/채팅방 패널: HTML 구조만 유지, 내용은 전부 AJAX로 채워짐 -->

	<!-- 알림 패널 열림 시 배경을 어둡게 처리하는 오버레이 -->
	<div class="overlay-backdrop" id="notificationBackdrop"></div>
	<!-- 알림 슬라이드 패널 -->
	<aside class="slide-panel" id="notificationPanel">
		<div class="panel-header">
			<h3>🔔 알림</h3><button class="panel-close" id="notificationClose">✕</button>
		</div>
		<div class="panel-body" id="notificationBody">
			<!-- app.js가 fetch('/api/notifications') 결과로 이 안을 채움 -->
		</div>
	</aside>

	<!-- 퀴즈 실행 플로팅 버튼 (FAB) -->
	<button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
	<!-- 퀴즈 패널 열림 시 배경 오버레이 -->
	<div class="overlay-backdrop" id="quizBackdrop"></div>
	<aside class="slide-panel" id="quizPanel">
		<div class="panel-header"><h3>💡 YouFlex 퀴즈</h3><button class="panel-close" id="quizClose">✕</button></div>
		<div class="panel-body">
			<div class="quiz-box" id="qnaQuizBox">
				<p class="quiz-intro">객관식/OX 문제를 하루 3번까지 풀 수 있어요. 퀴즈를 시작하고 정답 버튼을 선택해보세요!</p>
				<div class="quiz-count" id="qnaQuizCount">🎯 오늘 남은 퀴즈 횟수: 3/3</div>
				<button class="btn btn-sm btn-primary" id="qnaQuizStartBtn">퀴즈 시작</button>
				<!-- 문제 출제 시 이 안에 질문/선택지 버튼이 채워짐(app.js의 initQnaQuiz가 채움) -->
				<div id="qnaQuizPlay" style="display:none">
					<div class="quiz-question" id="qnaQuizQuestion"></div>
					<div class="quiz-options" id="qnaQuizOptions"></div>
				</div>
				<div class="quiz-result" id="qnaQuizResult" style="display:none"></div>
			</div>
		</div>
	</aside>

	<!-- 채팅방 패널 열림 시 배경 오버레이 -->
	<div class="overlay-backdrop" id="chatroomBackdrop"></div>
	<!-- layout.html의 채팅방 영역 공용 프래그먼트 재사용 (main.html과 동일) -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>

	<!-- 공통 푸터 -->

	<footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>


	<!-- 공통 스크립트: 알림/퀴즈/채팅방 등 공통 UI 동작 처리 -->
	<!-- 마이그레이션 중 목업 경로(/assets/js)가 남아있던 버그 수정: static/js로 이전 완료된 실제 경로로 교체 -->

	<script th:src="@{/js/app.js}"></script>
	<!-- 공지사항/Q&A 페이지 전용 스크립트: 탭 전환 등 처리 -->
	<script th:src="@{/js/notice.js}"></script>
</body>

</html>
