<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 관리자 Q&amp;A 답변</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>
<body>

<!--
==================================
공통 헤더바
==================================
-->
<header th:replace="~{fragments/layout :: header}"></header>

<!-- 공통 네비게이션 바 -->
<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
  <div class="notice-detail-wrap">

    <div class="notice-detail-title-row">
      <span class="badge" th:if="${qna.qnaIsSecret == '비밀'}" style="background:var(--danger);color:#fff;margin-right:8px">🔒 비밀글</span>
    </div>
    <h1 class="notice-detail-title" th:text="${qna.qnaTitle}">제목</h1>

    <!-- 질문 메타 정보: 작성자 / 등록일 (읽기 전용) -->
    <div class="notice-detail-meta">
      <span>작성자: <span th:text="${qna.memberName}">닉네임</span><br /></span>
      <span>등록일: <span th:text="${#temporals.format(qna.qnaCreatedAt, 'yyyy-MM-dd HH:mm')}"></span></span>
    </div>

    <!-- 질문 본문 (읽기 전용) -->
    <div class="notice-detail-body" th:text="${qna.qnaContent}">내용</div>

    <!-- 답변 작성/수정 폼: answer 존재 여부로 등록/수정 문구와 초기값 분기 -->
    <form id="adminAnswerForm" class="mt-24" th:attr="data-qna-id=${qna.qnaId}">
      <div class="form-row">
        <label th:text="${answer != null} ? '답변 수정' : '답변 등록'">답변</label>
        <textarea id="admin_answer_content" rows="8" th:text="${answer != null ? answer.adminAnswerContent : ''}" placeholder="답변 내용을 입력하세요"></textarea>
      </div>
      <div class="update-toolbar">
        <a th:href="@{/admin(tab=qna)}" class="btn">목록으로</a>
        <button type="button" class="btn btn-primary" id="adminAnswerSaveBtn"
                th:text="${answer != null} ? '수정' : '등록'">등록</button>
      </div>
    </form>
  </div>
</main>

<!-- 알림 슬라이드 패널 -->
<div class="overlay-backdrop" id="notificationBackdrop"></div>
<aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

<!-- 퀴즈 실행 플로팅 버튼(FAB) 및 퀴즈 패널 -->
<button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
<div class="overlay-backdrop" id="quizBackdrop"></div>
<aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>

<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>
	<!-- 채팅방 전용 알림 슬라이드 패널 (채팅 패널 옆에 나란히 열림) -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chatNotif}"></aside>
<!-- 공통 푸터 -->
<footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/chat.js}"></script>
<script th:src="@{/js/admin_qna_detail.js}"></script>
</body>
</html>
