<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 질문 작성</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/qna_write.css}" />
</head>
<!-- data-nav-current: 상단 네비게이션에서 현재 활성화된 메뉴(qna)를 표시하기 위한 속성 -->
<body data-nav-current="qna">

	<!-- 
	==================================
	공통 헤더바
	==================================
	-->
	<header th:replace="~{fragments/layout :: header}"></header>

	<!-- 
	==================================
	 공통 네비게이션 바
	==================================
	-->
	<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
  <div class="notice-detail-wrap">
    <h1 class="notice-detail-title">질문 작성</h1>

    <!-- 질문 작성 폼: 신규 작성이므로 qna-id 관련 속성 없음 (qna_update.html과 대비됨) -->
    <form id="qnaWriteForm">
    <div class="form-row">
      <label>제목</label>
      <input type="text" id="qna_title" name="qna_title" placeholder="질문 제목을 입력하세요" />
    </div>
    <div class="form-row">
      <label>내용</label>
      <textarea id="qna_content" name="qna_content" placeholder="질문 내용을 입력하세요"></textarea>
    </div>

    <!-- 공개 여부 선택: 신규 작성이므로 기본값 "공개"로 체크 -->
    <!-- 주의: 여기서 라디오 value는 "N"(공개)/"Y"(비공개)를 그대로 사용하지만,
         QnaServiceImpl.createQna()는 "Y"일 때만 "비밀"로 변환하고 그 외(N 포함)는 전부 "공개"로 처리하므로
         실제 값 매핑 자체는 정상 동작함. 다만 update 화면과 동일하게 서버가 저장하는 최종 문자열("비밀"/"공개")과
         이 폼의 값("Y"/"N")이 다르다는 점은 참고 필요 -->
    <div class="form-row">
      <label>공개 여부</label>
      <div class="visibility-options">
        <label class="visibility-option"><input type="radio" name="qna_is_secret" value="N" checked /> 공개</label>
        <label class="visibility-option"><input type="radio" name="qna_is_secret" value="Y" /> 비공개</label>
      </div>
    </div>

    <!-- 취소(목록으로 이동) / 등록(JS로 저장 처리) 버튼 -->
    <div class="update-toolbar">
      <a th:href="@{/notice#qna}" class="btn">취소</a>
      <button type="button" class="btn btn-primary" id="qnaSubmitBtn">등록</button>
    </div>
    </form>
  </div>
</main>

<!-- 알림 슬라이드 패널 -->
<div class="overlay-backdrop" id="notificationBackdrop"></div>
<aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

<!-- 퀴즈 실행 플로팅 버튼(FAB) 및 퀴즈 패널 -->
<button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
<div class="overlay-backdrop" id="quizBackdrop"></div>
<aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>

<!-- 커뮤니티 채팅 패널 -->
<div class="overlay-backdrop" id="chatroomBackdrop"></div>
<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>
<!-- 채팅방 전용 알림 슬라이드 패널 (채팅 패널 옆에 나란히 열림) -->
<aside class="slide-panel" th:replace="~{fragments/layout :: chatNotif}"></aside>

<!-- 공통 푸터 -->
<footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>

<!-- 공통 스크립트 및 이 페이지 전용 스크립트(작성 폼 제출 처리는 qna_write.js에서 담당) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/qna_write.js"></script>
</body>
</html>
