<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - Q&amp;A 상세</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/qna_detail.css}" />
</head>
<!-- data-nav-current: 상단 네비게이션에서 현재 활성화된 메뉴(qna)를 표시하기 위한 속성 -->
<body data-nav-current="qna">

	<!-- 
	==================================
	공통 헤더바
	==================================
	-->
	<header th:replace="~{fragments/layout :: header}"></header>

	<!-- 
	==================================
	 공통 네비게이션 바
	==================================
	-->
	<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

<main class="container">
  <div class="notice-detail-wrap">

    <!-- 질문 제목 + 작성자 전용 액션 버튼 - 같은 줄에 배치(.notice-detail-title-row가 flex space-between) -->
    <div class="notice-detail-title-row">
      <h1 class="notice-detail-title">
        <!-- 비밀글 배지: 이 페이지에 도달했다는 것 자체가 작성자 본인 또는 관리자라는 뜻이므로 별도 권한 체크 불필요 -->
        <span class="badge" th:if="${qna.qnaIsSecret == '비밀'}" style="background:var(--danger);color:#fff;margin-right:8px">🔒 비공개</span>
        <span th:text="${qna.qnaTitle}">제목</span>
      </h1>
      <!-- 작성자 본인에게만 노출. th:if로 세션의 loginMember.memberId와 게시글 작성자 memberId를 직접 비교 (Spring Security sec:authorize 미사용) -->
      <div class="owner-actions" th:if="${session.loginMember != null and session.loginMember.memberId == qna.memberId}"
           style="display:flex;gap:8px;flex-shrink:0">
        <a th:href="@{/qna/{id}/update(id=${qna.qnaId})}" class="btn btn-sm">수정</a>
        <!-- 삭제 버튼: confirm 후 하단 스크립트의 deleteQna() 호출 -->
        <button class="btn btn-sm" style="border-color:var(--danger);color:var(--danger)"
                th:onclick="|if(confirm('정말 삭제하시겠습니까?')) deleteQna(${qna.qnaId})|">삭제</button>
      </div>
    </div>

    <!-- 질문 메타 정보: 작성자 / 등록일 / 조회수 -->
    <div class="notice-detail-meta">
      <span>작성자: <span th:text="${qna.memberName}">닉네임</span><br /></span>
      <span>등록일: <span th:text="${#temporals.format(qna.qnaCreatedAt, 'yyyy-MM-dd HH:mm')}"></span><br /></span>
      <!-- 조회수 - 상세 페이지 진입 시 서버(QnaServiceImpl)에서 1 증가된 값 -->
      <span>조회수: <span th:text="${qna.qnaHit}"></span></span>
    </div>

    <!-- 질문 본문 -->
    <div class="notice-detail-body" th:text="${qna.qnaContent}">내용</div>

    <!-- 관리자 답변 or 대기 박스 분기 -->
    <!-- answer가 null이 아니면 답변 박스, null이면 대기 안내 박스 노출 (QnaViewController에서 전달) -->
    <div class="qna-answer-box" th:if="${answer != null}">
      <div class="qna-answer-label">✔ 관리자 답변
        <span class="qna-answer-date" th:text="${#temporals.format(answer.adminAnswerCreatedAt, 'yyyy-MM-dd HH:mm')}"></span>
        <!-- 답변 삭제 버튼: 관리자 등급일 때만 노출 -->
        <button class="btn btn-sm" th:if="${session.loginMember != null and session.loginMember.memberGrade == '관리자'}"
                th:onclick="|deleteAnswer(${qna.qnaId}, ${answer.adminAnswerId})|">삭제</button>
      </div>
      <div class="qna-answer-body" th:text="${answer.adminAnswerContent}"></div>
    </div>
    <!-- 답변이 아직 없는 경우 안내 문구 -->
    <div class="qna-wait-box" th:if="${answer == null}">
      아직 관리자 답변이 등록되지 않았습니다.
    </div>

    <!-- 질문 신고 버튼: 클릭 시 하단 신고 모달 오픈 -->
    <div style="display:flex;justify-content:flex-end;margin-top:16px;padding-bottom:20px;border-bottom:1px solid var(--border)">
      <button class="btn btn-sm btn-ghost" th:onclick="|openReportModal(${qna.qnaId})|">🚩 신고</button>
    </div>

    <!-- 댓글 영역 -->
    <section class="qna-comment-section">
      <!-- 댓글 개수 표시 -->
      <h3 id="commentCountLabel" th:text="'댓글 (' + ${comments.size()} + ')'">댓글</h3>

      <!-- 댓글 목록 반복 출력 -->
      <div class="qna-comment-item" th:each="comment : ${comments}" th:attr="data-comment-id=${comment.qnaCommentId}">
        <div class="qna-comment-left">
          <div class="qna-comment-avatar"></div>
          <div>
            <span class="qna-comment-author" th:text="${comment.memberName}">닉네임</span>
            <span class="qna-comment-date" th:text="${#temporals.format(comment.qnaCommentCreatedAt, 'yyyy-MM-dd HH:mm')}"></span>
            <div class="qna-comment-body" th:text="${comment.qnaCommentContent}"></div>
            <!-- 댓글 수정 폼: 기본 숨김, 수정 버튼 클릭 시 toggleCommentUpdateForm()으로 노출. qna-report-form 클래스를 같이 붙여 기존 박스 스타일 재사용 -->
            <div class="qna-report-form qna-comment-update-form" style="display:none">
              <textarea class="qna-comment-update-input" maxlength="100" th:text="${comment.qnaCommentContent}"></textarea>
              <div class="btn-row" style="margin-top:0">
                <button type="button" class="btn btn-sm" onclick="cancelUpdateComment(this)">취소</button>
                <button type="button" class="btn btn-sm btn-primary"
                        th:onclick="|saveUpdateComment(this, ${comment.qnaCommentId})|">저장</button>
              </div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <!-- 댓글 신고 버튼: 클릭 시 인라인 신고 폼 토글 -->
          <button class="btn btn-sm btn-ghost" onclick="toggleReportForm(this)">신고</button>
          <!-- 댓글 수정/삭제 버튼: 작성자 본인에게만 노출 -->
          <button class="btn btn-sm" th:if="${session.loginMember != null and session.loginMember.memberId == comment.memberId}"
                  onclick="toggleCommentUpdateForm(this)">수정</button>
          <button class="btn btn-sm" th:if="${session.loginMember != null and session.loginMember.memberId == comment.memberId}"
                  th:onclick="|if(confirm('정말 삭제하시겠습니까?')) deleteComment(${comment.qnaCommentId})|">삭제</button>
        </div>
        <!-- 댓글별 인라인 신고 폼: 기본 숨김, toggleReportForm()으로 노출 -->
        <div class="qna-report-form" style="display:none">
          <label class="text-muted" style="font-size:12px">신고 사유</label>
          <select>
            <option>스팸 / 도배</option><option>욕설 / 비방</option><option>음란물</option>
            <option>저작권 침해</option><option>기타</option>
          </select>
          <textarea placeholder="신고 사유를 구체적으로 입력해주세요"></textarea>
          <div class="btn-row" style="margin-top:0">
            <button type="button" class="btn btn-sm" onclick="closeReportForm(this)">취소</button>
            <button type="button" class="btn btn-sm btn-primary" onclick="submitReportForm(this)">신고하기</button>
          </div>
        </div>
      </div>

      <!-- 댓글 작성 입력폼 (data-qna-id로 어느 질문에 대한 댓글인지 JS에서 참조) -->
      <form id="qnaCommentForm" class="comment-input-row" th:attr="data-qna-id=${qna.qnaId}">
        <input type="text" id="qna_comment_content" name="qna_comment_content" maxlength="100" placeholder="댓글을 입력해 주세요." />
        <button type="button" class="btn btn-primary" id="commentSubmitBtn">등록</button>
      </form>
    </section>

    <!-- 목록 페이지로 이동 (공지/Q&A 통합 페이지의 qna 탭으로 이동) -->
    <div style="margin-top:20px">
      <a th:href="@{/notice#qna}" class="btn btn-primary">목록으로 (To List)</a>
    </div>
  </div>
</main>

<!-- 신고하기 모달: 질문 전체 신고용 (openReportModal()로 열림) -->
<div class="report-modal-backdrop" id="reportModalBackdrop">
  <div class="report-modal">
    <h2>🚩 신고하기</h2>
    <!-- 신고 대상 표시 칩 (JS에서 텍스트 갱신 가능) -->
    <div class="target-chip" id="reportTargetChip">신고 대상: 질문</div>
    <form id="reportForm">
    <div class="form-row">
      <label>신고 사유</label>
      <select id="reportReasonSelect">
        <option>스팸 / 도배</option><option>욕설 / 비방</option><option>음란물</option>
        <option>저작권 침해</option><option>기타</option>
      </select>
    </div>
    <div class="form-row">
      <label>상세 내용</label>
      <textarea id="reportDetailInput" rows="4" placeholder="신고 사유를 구체적으로 입력해주세요"></textarea>
    </div>
    <div class="btn-row">
      <button type="button" class="btn" onclick="closeReportModal()">취소</button>
      <button type="button" class="btn btn-primary" onclick="submitReportModal()">신고하기</button>
    </div>
    </form>
  </div>
</div>

<!-- 알림 슬라이드 패널 -->
<div class="overlay-backdrop" id="notificationBackdrop"></div>
<aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

<!-- 퀴즈 실행 플로팅 버튼(FAB) 및 퀴즈 패널 -->
<button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
<div class="overlay-backdrop" id="quizBackdrop"></div>
<aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>

<!-- 커뮤니티 채팅 패널 -->
<div class="overlay-backdrop" id="chatroomBackdrop"></div>
<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>
<!-- 채팅방 전용 알림 슬라이드 패널 (채팅 패널 옆에 나란히 열림) -->
<aside class="slide-panel" th:replace="~{fragments/layout :: chatNotif}"></aside>

<!-- 공통 푸터 -->
<footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/chat.js}"></script>
<script th:src="@{/js/qna_detail.js}"></script>
</body>
</html>
