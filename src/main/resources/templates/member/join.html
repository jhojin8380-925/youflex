<!doctype html>
<html lang="ko" xmlns="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouFlex - 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/join.css}" />
  </head>
  <body>

    <!--
      ================================
      메인 영역
      ================================
    -->
    <main class="auth-wrap">
      <div class="card auth-card">
        <div class="auth-logo">
          <a th:href="@{/}"
            ><img th:src="@{/img/logo.png}" alt="YouFlex"
          /></a>
        </div>

        <!--
          ================================
          회원가입 폼 영역
          ================================
           -->
        <div class="id-status no" th:if="${joinError}" th:text="${joinError}" style="margin-bottom:12px"></div>

        <!-- 회원가입 작성 폼 시작 -->
        <form
          id="signupForm"
          th:action="@{/join}"
          method="post">
          <div class="form-row">
            <label>아이디</label>
            <div class="id-check-row">
              <input
                type="text"
                id="member_loginid"
                name="memberLoginid"
                placeholder="영문/숫자 4~16자"
                required/>
                
              <button type="button" class="btn btn-sm" id="idCheckBtn">
                중복확인
              </button>
            </div>
            <div class="id-status" id="idStatus"></div>
          </div>

          <div class="form-row">
            <label>비밀번호</label>
            <input
              type="password"
              id="member_pwd"
              name="memberPwd"
              placeholder="비밀번호를 입력하세요"
              required
            />
            <ul class="pw-rules" id="pwRules">
              <li id="rule-len"><span class="mark">○</span> 4자 이상</li>
            </ul>
          </div>

          <div class="form-row">
            <label>비밀번호 확인</label>
            <input
              type="password"
              id="pwConfirmInput"
              placeholder="비밀번호를 다시 입력하세요"
              required
            />
            <div class="pw-match" id="pwMatch"></div>
          </div>

          <div class="form-row">
            <label>이름</label
            ><input
              type="text"
              id="member_name"
              name="memberName"
              placeholder="이름"
              required
            />
          </div>
          <div class="form-row">
            <label>이메일</label
            ><input
              type="email"
              id="member_email"
              name="memberEmail"
              placeholder="example@email.com"
              required
            />
          </div>
          <div class="form-row">
            <label>전화번호</label
            ><input
              type="tel"
              id="member_phone"
              name="memberPhone"
              placeholder="010-0000-0000"
              required
            />
          </div>

          <div class="terms-box">
            [이용약관 요약]<br />
            · 비속어 사용, 도배, 스팸 등 이용규칙 위반 시 경고가 부여될 수
            있습니다.<br />
            · 경고가 3회 누적되면 계정이 강제 정지(탈퇴 처리)될 수 있습니다.<br />
            · 모든 게시글·댓글·채팅 메시지에는 비속어 필터링이 자동 적용됩니다.
          </div>
          <label class="terms-agree">
            <input type="checkbox" required style="margin-top: 2px" />
            <span>위 이용약관 및 경고·제재 정책에 동의합니다. (필수)</span>
          </label>

          <button type="submit" class="btn btn-primary btn-block">
            가입하기
          </button>
        </form>

        <div class="auth-footer">
          이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </div>
      </div>
    </main>

    <!--
      ================================
      회원가입 완료 직후: 관심 장르 선택
      ================================
      genre_category 테이블 값을 MemberController가 model로 내려준 ${genres}로 뿌림.
      선택한 칩의 data-genre-id를 join.js가 모아서 hidden input(genreCategoryIds)으로
      제출 폼에 추가함(최대 3개, join.js에서 제한). 실제 저장은 preference_mapping 테이블.
      -->
    <div class="genre-modal-backdrop" id="genreModalBackdrop">
      <div class="genre-modal-card">
        <div class="auth-logo">
          <img th:src="@{/img/logo.png}" alt="YouFlex" />
        </div>
        <h2 class="genre-title">카테고리 선택</h2>
        <p class="genre-sub">관심 있는 장르를 선택해주세요 (최대 3개)</p>
        <div class="genre-grid" id="genreGrid">
          <button type="button" class="genre-chip"
                  th:each="genre : ${genres}"
                  th:attr="data-genre-id=${genre.genreCategoryId}">
            <span th:text="${genre.genreCategoryName}"></span> <span class="chip-check">✓</span>
          </button>
        </div>
        <button
          type="button"
          class="btn btn-primary btn-block"
          id="genreDoneBtn"
        >
          완료
        </button>
        <button type="button" class="genre-skip" id="genreSkipBtn">
          나중에 설정하기
        </button>
      </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script th:src="@{/js/join.js}"></script>
  </body>
</html>
