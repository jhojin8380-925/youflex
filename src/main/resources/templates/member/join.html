<!doctype html>
<html lang="ko" xmlns="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouFlex - 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/join.css}" />
  </head>
  <body>

    <!--
      ================================
      메인 영역
      ================================
    -->
    <main class="auth-wrap">
      <div class="card auth-card">
        <div class="auth-logo">
          <a th:href="@{/}"
            ><img th:src="@{/img/logo.png}" alt="YouFlex"
          /></a>
        </div>

        <!--
          ================================
          회원가입 폼 영역
          ================================
           -->
        <div class="id-status no" th:if="${joinError}" th:text="${joinError}" style="margin-bottom:12px"></div>

        <form
          id="signupForm"
          th:action="@{/join}"
          method="post"
          onsubmit="
            event.preventDefault();
            openGenreModal();">
          <div class="form-row">
            <label>아이디</label>
            <div class="id-check-row">
              <input
                type="text"
                id="member_loginid"
                name="memberLoginid"
                placeholder="영문/숫자 4~16자"
                required
              />
              <button type="button" class="btn btn-sm" id="idCheckBtn">
                중복확인
              </button>
            </div>
            <div class="id-status" id="idStatus"></div>
          </div>

          <div class="form-row">
            <label>비밀번호</label>
            <input
              type="password"
              id="member_pwd"
              name="memberPwd"
              placeholder="비밀번호를 입력하세요"
              required
            />
            <ul class="pw-rules" id="pwRules">
              <li id="rule-len"><span class="mark">○</span> 8자 이상</li>
              <li id="rule-letter"><span class="mark">○</span> 영문 포함</li>
              <li id="rule-digit"><span class="mark">○</span> 숫자 포함</li>
              <li id="rule-special">
                <span class="mark">○</span> 특수문자 포함
              </li>
            </ul>
          </div>

          <div class="form-row">
            <label>비밀번호 확인</label>
            <input
              type="password"
              id="pwConfirmInput"
              placeholder="비밀번호를 다시 입력하세요"
              required
            />
            <div class="pw-match" id="pwMatch"></div>
          </div>

          <div class="form-row">
            <label>이름</label
            ><input
              type="text"
              id="member_name"
              name="memberName"
              placeholder="이름"
              required
            />
          </div>
          <div class="form-row">
            <label>이메일</label
            ><input
              type="email"
              id="member_email"
              name="memberEmail"
              placeholder="example@email.com"
              required
            />
          </div>
          <div class="form-row">
            <label>전화번호</label
            ><input
              type="tel"
              id="member_phone"
              name="memberPhone"
              placeholder="010-0000-0000"
              required
            />
          </div>

          <div class="terms-box">
            [이용약관 요약]<br />
            · 비속어 사용, 도배, 스팸 등 이용규칙 위반 시 경고가 부여될 수
            있습니다.<br />
            · 경고가 3회 누적되면 계정이 강제 정지(탈퇴 처리)될 수 있습니다.<br />
            · 모든 게시글·댓글·채팅 메시지에는 비속어 필터링이 자동 적용됩니다.
          </div>
          <label class="terms-agree">
            <input type="checkbox" required style="margin-top: 2px" />
            <span>위 이용약관 및 경고·제재 정책에 동의합니다. (필수)</span>
          </label>

          <button type="submit" class="btn btn-primary btn-block">
            가입하기
          </button>
        </form>

        <div class="auth-footer">
          이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </div>
      </div>
    </main>

    <!-- 
      ================================
      회원가입 완료 직후: 관심 장르 선택 
      ================================
      - 백 엔드 설명 - DB 에 장르 카테고리에 값 넣고 th:each 로 뽑아와서 표시
      -->
    <div class="genre-modal-backdrop" id="genreModalBackdrop">
      <div class="genre-modal-card">
        <div class="auth-logo">
          <img th:src="@{/img/logo.png}" alt="YouFlex" />
        </div>
        <h2 class="genre-title">카테고리 선택</h2>
        <p class="genre-sub">관심 있는 장르를 선택해주세요 (복수 선택 가능)</p>
        <div class="genre-grid" id="genreGrid">
          <button type="button" class="genre-chip" data-genre="액션">
            <span>액션</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="모험">
            <span>모험</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="애니메이션">
            <span>애니메이션</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="코미디">
            <span>코미디</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="범죄">
            <span>범죄</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="다큐멘터리">
            <span>다큐멘터리</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="드라마">
            <span>드라마</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="가족">
            <span>가족</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="판타지">
            <span>판타지</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="역사">
            <span>역사</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="공포">
            <span>공포</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="뮤지컬">
            <span>뮤지컬</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="미스터리">
            <span>미스터리</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="로맨스">
            <span>로맨스</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="SF">
            <span>SF</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="스릴러">
            <span>스릴러</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="서부극">
            <span>서부극</span> <span class="chip-check">✓</span>
          </button>
          <button type="button" class="genre-chip" data-genre="예능">
            <span>예능</span> <span class="chip-check">✓</span>
          </button>
        </div>
        <button
          type="button"
          class="btn btn-primary btn-block"
          id="genreDoneBtn"
        >
          완료
        </button>
        <button type="button" class="genre-skip" id="genreSkipBtn">
          나중에 설정하기
        </button>
      </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script th:src="@{/js/join.js}"></script>
  </body>
</html>
