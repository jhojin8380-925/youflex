<!doctype html>
<html lang="ko" xmlns="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouFlex - 로그인</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>

    <!--
      ================================
      메인 영역
      ================================
    -->
    <main class="auth-wrap">
      <div class="card auth-card">
        <div class="auth-logo">
          <a th:href="@{/}"
            ><img th:src="@{/img/logo.png}" alt="YouFlex"
          /></a>
        </div>

        <!--
          ================================
          로그인 폼 영역
          ================================
        -->
        <div class="id-status no" th:if="${loginError}" th:text="${loginError}" style="margin-bottom:12px"></div>

        <form th:action="@{/login}" method="post">
          <div class="form-row">

            <label>아이디</label>
            <input
              type="text"
              id="member_loginid"
              name="memberLoginid"
              th:value="${rememberedId}"
              placeholder="아이디를 입력하세요"
              required
            />
          </div>
          <div class="form-row">

            <label>비밀번호</label>
            <input
              type="password"
              id="member_pwd"
              name="memberPwd"
              placeholder="비밀번호를 입력하세요"
              required
            />
          </div>
          <label class="remember-row">
            <input type="checkbox" name="rememberId" th:checked="${rememberedId != null}" /> 아이디 저장
          </label>
          <button type="submit" class="btn btn-primary btn-block">
            로그인
          </button>
        </form>

        <div class="auth-divider">또는</div>
        <button
          type="button"
          class="btn btn-block social-btn kakao"
          onclick="socialLogin('카카오')"
        >
          <span class="social-icon">💬</span> 카카오로 로그인
        </button>
        <button
          type="button"
          class="btn btn-block social-btn google"
          onclick="socialLogin('구글')"
        >
          <span class="social-icon">G</span> 구글로 로그인
        </button>

        <div class="auth-footer">
          아직 회원이 아니신가요? <a th:href="@{/join}">회원가입</a>
        </div>
      </div>
    </main>

    <script th:src="@{/js/app.js}"></script>
    <script th:src="@{/js/login.js}"></script>
  </body>
</html>
