<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>YouFlex - 글쓰기</title>
	<link rel="stylesheet" th:href="@{/css/common.css}" />
	<link rel="stylesheet" th:href="@{/css/write.css}" />
</head>

<body>


	<!--
  ==================================
  공통 헤더바
  ==================================
  -->
	<header th:replace="~{fragments/layout :: header}"></header>

	<!--
  ==================================
  공통 네비게이션 바
  ==================================
  -->
	<nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

	<!--
  ==================================
  메인 영역
  ==================================
-->
	<main class="container">

		<div class="write-page-grid">
			<div class="write-wrap">
				<!-- '장르'버튼 넣을 div박스 추가(웅조) -->
				<div class="review-genre-box">
					<h1>리뷰 작성</h1>
					<button type="button" class="taste-btn box" id="tasteBtn"><span>❤️ 관련 장르</span></button>
				</div>

				<!-- 금칙어 안내 배너: 등록 거부 시 작성 중이던 내용이 사라진다는 점을 미리 안내 -->
				<div
					style="display:flex;align-items:flex-start;gap:8px;background:rgba(230,57,70,0.12);border:1px solid var(--danger);color:var(--danger);border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.6;margin:16px 0">
					<span style="flex-shrink:0">⚠</span>
					<span>금칙어(비속어)가 포함되어 있으면 등록이 거부됩니다. 등록이 거부되면 작성 중이던 내용이 사라지니, 등록 전 다시 한 번 확인해주세요.</span>
				</div>

				<!--
      ==================================
      리뷰 작성 폼
      ==================================
    -->
				<form id="reviewForm" th:action="@{/review/write}" method="post" enctype="multipart/form-data">
					<!--임시저장 ID를 저장할 hidden input (기본값 0)-->
					<!-- id와 name 속성이 둘 다 명시되어 있어야 스크립트와 컨트롤러 모두 정상적으로 읽습니다 -->
					<input type="hidden" id="review_draft_id" name="reviewDraftId" value="0" />

					<!-- 금칙어 포함으로 등록이 막혀 되돌아온 경우에만 표시 -->
					<div th:if="${badWordError}" th:text="${badWordError}"
						style="background:rgba(230,57,70,0.12);border:1px solid var(--danger);color:var(--danger);padding:10px 14px;border-radius:8px;margin-bottom:16px">
						금칙어가 포함되어 있어 등록할 수 없습니다.
					</div>
					<div class="form-row">
						<label>플랫폼</label>
						<select id="review_platform" name="reviewPlatform">
							<option>넷플릭스</option>
							<option>티빙</option>
							<option>디즈니+</option>
							<option>기타</option>
						</select>
					</div>

					<!-- 제목 작성 영역 -->
					<div class="form-row">
						<label>제목</label>
						<input type="text" id="review_title" name="reviewTitle" placeholder="제목을 입력하세요" />
					</div>

					<!-- 별점 수정(웅조) -->
					<div class="form-group">
						<label><span class="gradient-star-text">관람평 (⭐/5.0)</span></label>
						<div class="rating-input">
							<div class="star-box" data-value="1">
								<span class="half left">★</span>
								<span class="half right">★</span>
							</div>
							<div class="star-box" data-value="2">
								<span class="half left">★</span>
								<span class="half right">★</span>
							</div>
							<div class="star-box" data-value="3">
								<span class="half left">★</span>
								<span class="half right">★</span>
							</div>
							<div class="star-box" data-value="4">
								<span class="half left">★</span>
								<span class="half right">★</span>
							</div>
							<div class="star-box" data-value="5">
								<span class="half left">★</span>
								<span class="half right">★</span>
							</div>
						</div>
						<!-- 별점값 js에서 클릭시 value를 업데이트 -->
						<input type="hidden" name="reviewRating" value="4">
						<div class="text-muted text-sm mt-8">별을 클릭해서 별점을 선택하세요 (1~5점)</div>
					</div>

					<!-- 대표이미지 수정(웅조) -->
					<div class="form-row">
						<label>대표 이미지</label>
						<div class="wrap-representative-img">
							<input type="file" name="imgFile" id="imgInput" accept="image/*" style="font-size:0.85rem;"
								class="representative-img">
							<img id="imgPreview" alt="미리보기"
								style="display:none; max-width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin-top:10px;">
						</div>
					</div>

					<!-- 본문 내용 작성 -->
					<div class="form-row">
						<label>본문</label>
						<textarea id="review_content" name="reviewContent" placeholder="리뷰 내용을 입력하세요"></textarea>
						<div class="hint-line">※ 등록된 내용은 비속어 필터링이 자동 적용됩니다.</div>
					</div>

					<div class="form-row">
						<label>관련작품</label>
						<input type="text" id="review_related" name="reviewRelated"
							placeholder="관련 작품명을 입력하세요 (예: 오징어게임 3)" />
					</div>

					<!-- 임시저장 영역 -->
					<div class="write-toolbar">
						<span class="autosave-hint" id="autosaveHint">임시저장된 내용 없음</span>
						<div class="flex gap-8" style="align-items:center">
							<span class="text-muted" style="font-size:12px">제목과 내용만 저장 가능합니다</span>
							<button type="button" class="btn" id="draftBtn">임시저장</button>
							<button type="submit" class="btn btn-primary" id="submitBtn">등록</button>
						</div>
					</div>
				</form>
			</div>

			<!--
    ==================================
    임시저장 목록 영역
    ==================================
    -->
			<aside class="draft-sidebar">
				<h3>임시저장 목록</h3>

				<!-- 데이터가 없을 때 보일 안내 메시지 -->
				<div id="draftEmptyMsg" style="color: var(--text-2); font-size: 13px;">
					임시저장된 글이 없습니다.
				</div>

				<!-- write.js에서 목록을 추가해 줄 컨테이너 -->
				<div id="draftList"></div>
			</aside>
		</div>
	</main>

	<!-- 
  ================================
  오버레이 영역
  ================================
  -->
	<div class="overlay-backdrop" id="notificationBackdrop"></div>

	<!-- 
  ================================
  알림 영역
  ================================
  -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

	<!--
  ================================
  퀴즈 영역
  ================================
  -->
	<button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
	<div class="overlay-backdrop" id="quizBackdrop"></div>
	<aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>

	<!--
  ================================
  채팅방 영역
  ================================
  -->
	<div class="overlay-backdrop" id="chatroomBackdrop"></div>
	<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>
	<!-- 채팅방 전용 알림 슬라이드 패널 (채팅 패널 옆에 나란히 열림) -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chatNotif}"></aside>

	<!-- 취향(관심 장르) 선택 -->
	<div class="genre-modal-backdrop" id="genreModalBackdrop">
		<div class="genre-modal-card">
			<h2 gnere-title>취향 선택</h2>
			<p class="genre-sub">관심 있는 장르를 선택해주세요 (최대 3개)</p>
			<div class="genre-grid" id="genreGrid">
				<button type="button" class="genre-chip" th:each="genre : ${genres}"
					th:attr="data-genre-id=${genre.genreCategoryId}">
					<span th:text="${genre.genreCategoryName}"></span> <span class="chip-check">✓</span>
				</button>
			</div>
			<button type="button" class="genre-skip" id="genreSkipBtn">
				취소
			</button>
			<button type="button" class="btn btn-primary btn-block" id="genreDoneBtn">
				저장
			</button>
		</div>
	</div>


	<!--==================================
  푸터 영역 
  ==================================
  -->
	<footer th:replace="~{fragments/layout :: footer}"></footer>


	<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
	<script th:src="@{/js/app.js}"></script>
	<script th:src="@{/js/chat.js}"></script>
	<script th:src="@{/js/write.js}"></script>
</body>

</html>
