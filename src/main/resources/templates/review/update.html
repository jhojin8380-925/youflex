<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 게시글 수정</title>
<link rel="stylesheet" th:href="@{/css/common.css}" />
<link rel="stylesheet" th:href="@{/css/update.css}" />
</head>
<body>

    <!--
    ==================================
      공통 헤더바
    ==================================
    -->
    <header th:replace="~{fragments/layout :: header}"></header>

    <!--
    ==================================
      공통 네비게이션 바
    ==================================
    -->
    <nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

<!--
  ==================================
  메인 영역
  ==================================
  -->
<main class="container">
  <div class="edit-wrap">
    <div class="edit-header">
      <h1>게시글 수정</h1>
      <button type="button" class="taste-btn box" id="tasteBtn"><span>❤️ 관련 장르</span></button>
      <span class="target-chip" th:text="|게시글 #${review.reviewId} · ${#temporals.format(review.reviewCreatedAt, 'yyyy-MM-dd HH:mm')} 작성|">게시글 #101 · 2026-06-30 14:22 작성</span>
    </div>

    <div class="edit-meta-box">
      <span>조회수 <strong th:text="${review.reviewHit}">15,204</strong></span>
      <span>좋아요 <strong th:text="${likeCount}">892</strong></span>
      <span>댓글 <strong th:text="${commentCount}">128</strong></span>
    </div>

    <div class="edit-notice">⚠ 수정 완료 시 게시글에 "수정됨" 표시가 노출됩니다. 별점·좋아요·댓글은 그대로 유지됩니다.</div>

    <!-- 금칙어 포함으로 수정이 막혀 되돌아온 경우에만 표시 -->
    <div th:if="${badWordError}" th:text="${badWordError}"
      style="background:rgba(230,57,70,0.12);border:1px solid var(--danger);color:var(--danger);padding:10px 14px;border-radius:8px;margin-bottom:16px">
      금칙어가 포함되어 있어 수정할 수 없습니다.
    </div>

    <!--
      ==================================
      수정 폼
      ==================================
    -->
    <form id="reviewUpdateForm" th:action="@{'/review/' + ${review.reviewId} + '/update'}" method="post" enctype="multipart/form-data">
      <!-- 이미 선택돼있던 장르(장르 모달을 열지 않고 바로 "수정 완료"를 눌러도 기존 장르가 유지되도록 미리 렌더링) -->
      <input type="hidden" th:each="genre : ${review.genreList}" name="genreCategoryIds" th:value="${genre.genreCategoryId}" />

      <div class="form-row">
        <label>플랫폼</label>
        <select id="review_platform" name="reviewPlatform">
          <option th:selected="${review.reviewPlatform == '넷플릭스'}">넷플릭스</option>
          <option th:selected="${review.reviewPlatform == '티빙'}">티빙</option>
          <option th:selected="${review.reviewPlatform == '디즈니+'}">디즈니+</option>
          <option th:selected="${review.reviewPlatform == '기타'}">기타</option>
        </select>
      </div>

      <!-- 제목 작성 영역 -->
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="review_title" name="reviewTitle" th:value="${review.reviewTitle}" />
      </div>

      <!-- 별점 -->
      <div class="form-group">
        <label><span class="gradient-star-text">관람평 (⭐/5.0)</span></label>
        <div class="rating-input">
          <div class="star-box" data-value="1">
            <span class="half left">★</span>
            <span class="half right">★</span>
          </div>
          <div class="star-box" data-value="2">
            <span class="half left">★</span>
            <span class="half right">★</span>
          </div>
          <div class="star-box" data-value="3">
            <span class="half left">★</span>
            <span class="half right">★</span>
          </div>
          <div class="star-box" data-value="4">
            <span class="half left">★</span>
            <span class="half right">★</span>
          </div>
          <div class="star-box" data-value="5">
            <span class="half left">★</span>
            <span class="half right">★</span>
          </div>
        </div>
        <!-- 별점값 js에서 클릭시 value를 업데이트 -->
        <input type="hidden" name="reviewRating" th:value="${review.reviewRating ?: 0}">
        <div class="text-muted text-sm mt-8">별을 클릭해서 별점을 선택하세요 (1~5점)</div>
      </div>

      <div class="form-row">
        <label>대표 이미지</label>
        <div class="current-thumb">
          <input type="file" name="imgFile" id="imgInput" accept="image/*" style="font-size:0.85rem;" class="representative-img">
          <img id="imgPreview" alt="미리보기" th:if="${review.reviewImg != null}"
            th:src="@{'/upload/' + ${review.reviewImg}}"
            style="display:block;max-width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:10px;">
          <img id="imgPreview" alt="미리보기" th:unless="${review.reviewImg != null}"
            style="display:none;max-width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:10px;">
        </div>
      </div>

      <div class="form-row">
        <label>본문</label>
        <textarea id="review_content" name="reviewContent" th:text="${review.reviewContent}"></textarea>
        <div class="hint-line">※ 수정된 내용은 비속어 필터링이 자동 재적용됩니다.</div>
      </div>

      <div class="form-row">
        <label>관련작품</label>
        <input type="text" id="review_related" name="reviewRelated" th:value="${review.reviewRelated}" />
      </div>

      <div class="edit-toolbar">
        <a th:href="@{'/review/' + ${review.reviewId}}" class="btn">취소</a>
        <button type="submit" class="btn btn-primary" id="submitBtn">수정 완료</button>
      </div>
    </form>
  </div>
</main>

<!--
  ================================
  오버레이 영역
  ================================
  -->
<div class="overlay-backdrop" id="notificationBackdrop"></div>

<!--
  ================================
  알림 영역
  ================================
  -->
<aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

    <!--
  ================================
  퀴즈 영역
  ================================
  -->
    <button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
    <div class="overlay-backdrop" id="quizBackdrop"></div>
    <aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>

    <!--
  ================================
  채팅방 영역
  ================================
  -->
	<div class="overlay-backdrop" id="chatroomBackdrop"></div>
	<aside class="slide-panel" th:replace="~{fragments/layout :: chat}"></aside>
	<!-- 채팅방 전용 알림 슬라이드 패널 (채팅 패널 옆에 나란히 열림) -->
	<aside class="slide-panel" th:replace="~{fragments/layout :: chatNotif}"></aside>

<!-- 취향(관심 장르) 선택 -->
<div class="genre-modal-backdrop" id="genreModalBackdrop">
  <div class="genre-modal-card">
    <h2 class="genre-title">관련 장르 선택</h2>
    <p class="genre-sub">이 게시글과 관련된 장르를 선택해주세요 (최대 3개)</p>
    <div class="genre-grid" id="genreGrid">
      <button type="button" class="genre-chip"
              th:each="genre : ${genres}"
              th:classappend="${selectedGenreIds.contains(genre.genreCategoryId)} ? 'selected' : ''"
              th:attr="data-genre-id=${genre.genreCategoryId}">
        <span th:text="${genre.genreCategoryName}"></span> <span class="chip-check">✓</span>
      </button>
    </div>
    <button type="button" class="genre-skip" id="genreSkipBtn">취소</button>
    <button type="button" class="btn btn-primary btn-block" id="genreDoneBtn">저장</button>
  </div>
</div>

<!--
  ==================================
  공통 푸터 영역
  ==================================
  -->
<footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/update.js}"></script>
</body>
</html>
