<!doctype html>
<html lang="ko" xmlns="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouFlex - 메인</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
  </head>
  <body>
 
    <!-- 
    ==================================
      공통 헤더바
    ==================================
    -->
    <header th:replace="~{fragments/layout :: header}"></header>
    <!-- 
    ==================================
      공통 네비게이션 바
    ==================================
    -->
    <nav class="category-nav" th:replace="~{fragments/layout :: nav}"></nav>

    <!-- 
  ==================================
  메인 배너 영역  
  ==================================
  -->
    <main class="container">
      <!-- 최신화제작 글 추가 -나영- -->
      <span style="font-size: 30px;">🔥 </span>
      <h2 class="section-heading">
         최신 화제작
      </h2>
      <section class="hero-slider">
        <button class="hero-arrow prev" id="heroPrev">‹</button>
        <button class="hero-arrow next" id="heroNext">›</button>

        <div th:each="b, stat : ${bannerList}"
             th:class="${stat.first} ? 'hero-slide-content active' : 'hero-slide-content'">
          <img th:src="@{'/upload/' + ${b.bannerImg}}" class="hero-banner-img" />
          <span class="hero-badge" th:text="${b.bannerBadge}">NETFLIX 시리즈</span>
        </div>
        <div class="hero-slide-content active" th:if="${#lists.isEmpty(bannerList)}">
          <span class="hero-badge">등록된 배너가 없습니다</span>
        </div>

        <div class="hero-dots">
          <span th:each="b, stat : ${bannerList}" th:class="${stat.first} ? 'active' : ''"></span>
        </div>
      </section>

      <!-- 
    ==================================
    베스트리뷰글 영역 
    ==================================
    -->
      <div class="section-title mt-40">
        <h2 class="section-heading section-heading--purple">❤️ 인기 리뷰글</h2>
        <a th:href="@{/review/list}" class="more" id="popularMoreLink"
          >더보기 ›</a
        >
      </div>
      <div class="platform-tabs" data-tab-panels>
        <button class="active" data-tab-target="all">전체</button>
        <button data-tab-target="netflix">넷플릭스</button>
        <button data-tab-target="tving">티빙</button>
        <button data-tab-target="disney">디즈니플러스</button>
        <button data-tab-target="etc">기타</button>
      </div>
      <!--
    ==================================
    전체 
    ==================================
    -->
      <div class="rank-grid" data-tab-panel="all">
        <a class="rank-card" th:each="post, stat : ${popularReviews['all']}"
           th:href="@{/review/{id}(id=${post.reviewId})}">
          <div class="rank-thumb">
            <img th:if="${post.reviewImg != null and !#strings.isEmpty(post.reviewImg)}"
                 th:src="@{'/upload/' + ${post.reviewImg}}" class="list-img" />
          </div>
          <span class="rank-number" th:text="${stat.count}">1</span>
          <span class="rank-rating" th:text="'★ ' + ${post.reviewRating}">★ 4.8</span>
          <div class="rank-body">
            <div class="rank-title" th:text="${post.reviewTitle}">제목</div>
            <div class="rank-meta" th:text="${post.memberName} + ' · ❤ ' + ${post.likeCount}">작성자 · ❤ 0</div>
          </div>
        </a>
        <div class="text-muted" th:if="${#lists.isEmpty(popularReviews['all'])}"
             style="grid-column:1 / -1;text-align:center;padding:24px 0">
          아직 등록된 리뷰가 없습니다.
        </div>
      </div>

      <!-- 
    ==================================
    넷플릭스 
    ==================================
    -->
      <div class="rank-grid" data-tab-panel="netflix" style="display: none">
        <a class="rank-card" th:each="post, stat : ${popularReviews['netflix']}"
           th:href="@{/review/{id}(id=${post.reviewId})}">
          <div class="rank-thumb">
            <img th:if="${post.reviewImg != null and !#strings.isEmpty(post.reviewImg)}"
                 th:src="@{'/upload/' + ${post.reviewImg}}" class="list-img" />
          </div>
          <span class="rank-number" th:text="${stat.count}">1</span>
          <span class="rank-rating" th:text="'★ ' + ${post.reviewRating}">★ 4.8</span>
          <div class="rank-body">
            <div class="rank-title" th:text="${post.reviewTitle}">제목</div>
            <div class="rank-meta" th:text="${post.memberName} + ' · ❤ ' + ${post.likeCount}">작성자 · ❤ 0</div>
          </div>
        </a>
        <div class="text-muted" th:if="${#lists.isEmpty(popularReviews['netflix'])}"
             style="grid-column:1 / -1;text-align:center;padding:24px 0">
          아직 등록된 리뷰가 없습니다.
        </div>
      </div>

    ==================================
    티빙 
    ==================================

        <div class="text-muted" th:if="${#lists.isEmpty(popularReviews['tving'])}"

        </div>
      </div>

    ==================================
    디즈니 플러스 
    ==================================

          아직 등록된 리뷰가 없습니다.
        </div>
      </div>
      <!--
    ==================================
    기타 
    ==================================
    -->

      <div class="rank-grid" data-tab-panel="etc" style="display: none">
        <a class="rank-card" th:each="post, stat : ${popularReviews['etc']}"
           th:href="@{/review/{id}(id=${post.reviewId})}">
          <div class="rank-thumb">
            <img th:if="${post.reviewImg != null and !#strings.isEmpty(post.reviewImg)}"
                 th:src="@{'/upload/' + ${post.reviewImg}}" class="list-img" />
          </div>
          <span class="rank-number" th:text="${stat.count}">1</span>
          <span class="rank-rating" th:text="'★ ' + ${post.reviewRating}">★ 4.8</span>
          <div class="rank-body">
            <div class="rank-title" th:text="${post.reviewTitle}">제목</div>
            <div class="rank-meta" th:text="${post.memberName} + ' · ❤ ' + ${post.likeCount}">작성자 · ❤ 0</div>
          </div>
        </a>
        <div class="text-muted" th:if="${#lists.isEmpty(popularReviews['etc'])}"
             style="grid-column:1 / -1;text-align:center;padding:24px 0">
          아직 등록된 리뷰가 없습니다.
        </div>
      </div>

      <!-- 
    ==================================
    메인 공지사항 영역
    ==================================
  -->
      <div class="section-title mt-40">
        <h2>공지사항</h2>
        <!-- 공지사항 더보기 링크: 공지사항 목록 페이지로 이동 -->
        <a th:href="@{/notice}" class="more">더보기 ›</a>
      </div>
      <div class="notice-list">
        <!-- 등록된 공지사항이 없을 경우 안내 문구 표시 -->
        <div class="notice-row" th:if="${#lists.isEmpty(noticeList)}">
          <span class="notice-meta" style="grid-column:1 / -1;text-align:center">등록된 공지사항이 없습니다.</span>
        </div>
        <!-- 공지사항 최신 3건 반복 출력 (MainController에서 noticeService.getRecentNoticeList(3)로 전달) -->
        <div class="notice-row" th:each="notice : ${noticeList}">
          <span class="notice-badge">공지</span>
          <a th:href="@{/notice/{id}(id=${notice.noticeId})}"
            ><span th:text="${notice.noticeTitle}">제목</span></a
          >
          <!-- 작성자는 공지사항 특성상 항상 "관리자"로 고정 표기 (notice 테이블에 작성자 컬럼 없음) -->
          <span class="notice-meta">관리자</span>
          <span class="notice-meta" th:text="${#temporals.format(notice.noticeCreatedAt, 'yyyy-MM-dd')}">2026-06-28</span>
          <span class="notice-meta" th:text="'👁 ' + ${notice.noticeHit}">👁 0</span>
        </div>
      </div>
    </main>

    <!-- 
  ==================================
  푸터 영역 
  ==================================
  -->
    <footer class="site-footer main-footer" th:replace="~{fragments/layout :: footer}"></footer>

    <!-- 
  ================================
  오버레이 영역
  ================================
  -->
  <div class="overlay-backdrop" id="notificationBackdrop"></div>

    <!-- 
  ================================
  알림 영역
  ================================
  -->
    <aside class="slide-panel" th:replace="~{fragments/layout :: notification}"></aside>

    <!--
  ================================
  퀴즈 영역
  ================================
  -->
    <button class="fab" id="quizFab" title="퀴즈 실행">💡</button>
    <div class="overlay-backdrop" id="quizBackdrop"></div>
    <aside class="slide-panel" id="quizPanel" th:replace="~{fragments/layout :: quiz}"></aside>

    <script src="/js/app.js"></script>
    <script>
      document
        .getElementById("footerTopBtn")
        .addEventListener("click", function () {
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

      // 인기 리뷰글: 선택한 플랫폼 탭에 맞춰 "더보기" 링크도 해당 플랫폼 목록으로 이동하게
      document
        .querySelectorAll(".platform-tabs button")
        .forEach(function (btn) {
          btn.addEventListener("click", function () {
            var moreLink = document.getElementById("popularMoreLink");
            if (moreLink)
              moreLink.href = "/review/list?platform=" + btn.dataset.tabTarget;
          });
        });
    </script>
  </body>
</html>
