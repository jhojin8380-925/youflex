spring.application.name=youflex


# application.properties
# - DB 연결 정보, 서버 포트, Mybatis 경로 등을 이 파일 안에 설정



# 서버 포트 번호 설정
server.port=7080

# ----------------------------------------------------
# 1. MySQL DB 연결
# ----------------------------------------------------

# DB서버 주소(내 PC = localhost, 포트 3306, DB명 = youflex)

# useSSL=false          : SSL 보안 연결 사용 안 함 (로컬 개발 환경)
# serverTimezone        : 서버 시간대를 한국(Asia/Seoul)으로 지정
# characterEncoding     : 한글이 깨지지 않도록 UTF-8 인코딩 지정
spring.datasource.url=jdbc:mysql://localhost:3306/youflex?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# DB 접속 아이디
spring.datasource.username=root

# DB 접속 비밀번호
spring.datasource.password=1234

# MySQL 드리이버 연결
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------
# 2. MyBatis 설정
# ----------------------------------------------------

# Mapper xml 파일 위치 : resources/mappers/ 폴더 안의 모든 xml
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DB 컬럼명(member_id)을 자바 필드x명(memberId)으로 자동 변환
mybatis.configuration.map-underscore-to-camel-case=true

#-------------------
#파일 업로드 경로 설정
#-------------------
# 실제 파일이 저장될 서버 폴더 경로
youflex.upload.path=C:/upload/youflex/

# 파일 한 개의 최대 크기
spring.servlet.multipart.max-file-size = 10MB

# 요청 최대 크기
spring.servlet.multipart.max-request-size = 10MB

# -------------------
# 첫 로그인 시 오류 안나게 하는 코드
# -------------------
server.servlet.session.tracking-modes=cookie

# ----------------------------------------------------
# 3. 소셜로그인(카카오/구글)
# ----------------------------------------------------
# 각자 발급받은 client-id(/secret)만 아래에 채우면 바로 동작함(코드 수정 불필요).
# redirect-uri는 카카오/구글 개발자 콘솔에도 "허용 리디렉션 URI"로 똑같이 등록해야 함.

# 카카오 개발자센터 > 내 애플리케이션 > 앱 키 > REST API 키
# client-secret은 카카오 콘솔에서 "Client Secret" 사용을 활성화했을 때만 채우면 됨(선택, 비워둬도 동작)
youflex.oauth.kakao.client-id=
youflex.oauth.kakao.client-secret=
youflex.oauth.kakao.redirect-uri=http://localhost:7080/oauth/kakao/callback

# 구글 클라우드 콘솔 > API 및 서비스 > 사용자 인증 정보 > OAuth 2.0 클라이언트 ID
youflex.oauth.google.client-id=
youflex.oauth.google.client-secret=
youflex.oauth.google.redirect-uri=http://localhost:7080/oauth/google/callback

# 캐시 기간 설정
# 성능 저하될 수 있어서 개발할 때만 활성화하는걸 추천
# 사용 이유 : 이전에 남아있던 캐시를 브라우저가 계속 사용해서 수정된 코드가 적용되지 않을 수 있기 때문에
spring.web.resources.cache.period=0
